<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create custom QR codes with colors, frames, logo uploads, and export-ready PNG or JPG downloads." />
  <title>QR Generator</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="#generator" aria-label="QR Generator home">QR Generator ⛟</a>

    <button class="hamburger" id="hamburger" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="nav">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav" id="nav" aria-label="Main navigation">
      <a href="#generator">Generator</a>
      <a href="#download">Download</a>
      <a href="#about">About</a>
    </nav>
  </header>

  <main class="app-shell" id="generator">
    <section class="panel controls" aria-labelledby="generatorTitle">
      <div class="panel-heading">
        <p class="eyebrow">Studio</p>
        <h1 id="generatorTitle">QR Generator</h1>
      </div>

      <button class="mini-preview" id="miniPreview" type="button" aria-label="Jump to full QR preview"></button>

      <div class="control-section content-section">
        <label class="compact-field url-field">
          URL
          <input id="urlInput" type="url" placeholder="https://example.com" autocomplete="url" inputmode="url" />
        </label>

        <label class="compact-field">
          Quick Style
          <select id="presetInput">
            <option value="classic">Classic</option>
            <option value="modern" selected>Modern</option>
            <option value="sacred">Sacred</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="luxury">Luxury</option>
            <option value="nature">Nature</option>
          </select>
        </label>
      </div>

      <section class="control-section" aria-labelledby="appearanceTitle">
        <h2 id="appearanceTitle">Appearance</h2>
        <div class="control-row colors-row">
          <label class="compact-field">
            QR
            <input id="darkColorInput" type="color" value="#111827" />
          </label>

          <label class="compact-field">
            Background
            <input id="lightColorInput" type="color" value="#ffffff" />
          </label>

          <label class="compact-field">
            Corner
            <input id="cornerColorInput" type="color" value="#2563eb" />
          </label>
        </div>

        <div class="control-row style-row">
          <label class="compact-field">
            Dots
            <select id="dotStyleInput">
              <option value="square">Square</option>
              <option value="rounded" selected>Rounded</option>
              <option value="dots">Dots</option>
              <option value="classy">Classy</option>
              <option value="classy-rounded">Classy Rounded</option>
              <option value="extra-rounded">Extra Rounded</option>
            </select>
          </label>

          <label class="compact-field">
            Corners
            <select id="cornerStyleInput">
              <option value="square">Square</option>
              <option value="dot">Dot</option>
              <option value="extra-rounded" selected>Extra Rounded</option>
            </select>
          </label>

          <label class="checkbox inline-check">
            <input id="roundedInput" type="checkbox" checked />
            Rounded
          </label>
        </div>
      </section>

      <section class="control-section" aria-labelledby="frameTitle">
        <h2 id="frameTitle">Frame</h2>
        <div class="control-row frame-row">
          <label class="compact-field">
            Style
            <select id="frameStyleInput">
              <option value="none">None</option>
              <option value="rounded" selected>Rounded</option>
              <option value="glass">Glass</option>
              <option value="neon">Neon</option>
              <option value="sticker">Sticker</option>
            </select>
          </label>

          <label class="compact-field">
            <span class="range-label">
              Pad
              <span id="paddingValue" class="value-pill">7%</span>
            </span>
            <input id="paddingInput" type="range" min="0" max="20" value="7" />
          </label>

          <label class="compact-field">
            <span class="range-label">
              Border
              <span id="borderThicknessValue" class="value-pill">2px</span>
            </span>
            <input id="borderThicknessInput" type="range" min="0" max="24" value="2" />
          </label>
        </div>

        <div class="check-row">
          <label class="checkbox inline-check">
            <input id="frameRoundedInput" type="checkbox" checked />
            Rounded frame
          </label>

          <label class="checkbox inline-check">
            <input id="transparentInput" type="checkbox" />
            Transparent background
          </label>
        </div>
      </section>

      <section class="control-section" aria-labelledby="brandingTitle">
        <h2 id="brandingTitle">Branding</h2>
        <div class="control-row two">
          <label class="compact-field file-field">
            Logo
            <input id="logoInput" type="file" accept="image/png, image/jpeg, image/svg+xml" />
          </label>

          <label class="compact-field">
            <span class="range-label">
              Size
              <span id="logoSizeValue" class="value-pill">20%</span>
            </span>
            <input id="logoSizeInput" type="range" min="12" max="25" value="20" />
          </label>
        </div>
      </section>

      <section class="control-section" aria-labelledby="exportTitle">
        <h2 id="exportTitle">Export</h2>
        <div class="control-row two">
          <label class="compact-field">
            Size
            <input id="sizeInput" type="number" min="160" max="4096" value="420" />
          </label>

          <label class="compact-field">
            Format
            <select id="formatInput">
              <option value="png">PNG</option>
              <option value="jpg">JPG</option>
            </select>
          </label>
        </div>
      </section>

      <div class="scan-score excellent" id="scanScore">Scan Quality: Excellent</div>
      <p id="message" class="message" aria-live="polite"></p>

      <div class="actions" id="download">
        <button id="downloadBtn" class="primary-action" type="button">Download</button>
        <button id="copyBtn" class="ghost" type="button">Copy</button>
        <button id="resetBtn" class="ghost" type="button">Reset</button>
      </div>
    </section>

    <section class="panel preview" aria-labelledby="previewTitle">
      <div class="preview-header">
        <h2 id="previewTitle">Preview</h2>
        <span class="preview-size" id="previewSize">420 px</span>
      </div>
      <div id="qrPreview" class="qr-preview"></div>
    </section>
  </main>

  <!--
  <section class="about" id="about" aria-labelledby="aboutTitle">
    <h2 id="aboutTitle">About</h2>
    <p>Client-side QR generator. Your URL and logo stay in your browser.</p>
  </section> -->

  <script src="js/qr-code-styling.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/scanscore.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
